<div>
  <form
    class="bg-white text-gray-500 max-w-[340px] mx-4 p-6 text-left text-sm rounded-lg"
    [formGroup]="taskForm"
    (ngSubmit)="submitForm()"
  >
    <h2 class="text-gray-700 font-semibold text-base mb-4">Edit Task</h2>

    <div class="form-group">
      <label class="font-medium" for="title">Title</label>
      <input
        class="w-full border mt-1.5 mb-1 border-gray-500/30 outline-none rounded py-2.5 px-3"
        type="text"
        id="title"
        formControlName="title"
      />
      @if (taskForm.get('title')?.invalid && taskForm.get('title')?.touched) {
        <span class="text-red-500 text-xs mb-3 block">Title is required</span>
      }

      <label class="font-medium mt-3 block" for="description">Description</label>
      <textarea
        class="w-full border mt-1.5 mb-1 border-gray-500/30 outline-none rounded py-2.5 px-3"
        id="description"
        formControlName="description"
      ></textarea>
      @if (taskForm.get('description')?.invalid && taskForm.get('description')?.touched) {
        <span class="text-red-500 text-xs mb-3 block">Description is required</span>
      }

      <div class="flex items-center gap-2 mt-2 mb-4">
        <input
          type="checkbox"
          id="done"
          formControlName="done"
          class="w-4 h-4 accent-blue-500"
        />
        <label class="font-medium" for="done">Mark as done</label>
      </div>
    </div>

    <div class="flex gap-3">
      <button
        class="px-6 py-2 active:scale-95 transition bg-blue-500 rounded text-white shadow-lg shadow-blue-500/30 text-sm font-medium"
        type="submit"
        [disabled]="taskForm.invalid"
      >
        Save
      </button>
      <button
        class="px-6 py-2 active:scale-95 transition bg-gray-300 rounded text-gray-700 text-sm font-medium"
        type="button"
        (click)="close()"
      >
        Cancel
      </button>
    </div>
  </form>
</div>
